goal: "뉴스 대시보드를 실제 운영형 언론보도 아카이브로 개선한다."
context:
  production_url: "https://news-phi-cyan.vercel.app/"
  storage: "Google Sheets"
  runtime: "Vercel static site + Google Apps Script"
  users:
    primary:
      - "관리자"
      - "활동가"
    viewer:
      - "이사회 보고 대상"
      - "회원 공유 대상"
constraints:
  - "운영 고정 비용을 늘리지 않는다."
  - "관리자/보기 전용 두 권한만 둔다."
  - "관리자 접근은 사무처 내부 공유 비밀번호 하나로 한다."
  - "보기 전용 링크는 링크를 아는 사람이 접근할 수 있다."
  - "사업계획서 본문 붙여넣기 기능은 제거한다."
  - "사업계획서는 Google Docs 링크, PDF 파일, DOCX 파일 업로드를 지원한다."
  - "기사 품질은 자동 추천하되 관리자가 최종 선택한다."
  - "사업계획서에 없는 돌발 현장 대응 기사는 기본 팀 분류 또는 기타로 처리한다."
acceptance_criteria:
  - "관리자 토큰 입력 UI가 사라지고 관리자 비밀번호 입력으로 쓰기 기능에 접근한다."
  - "보기 전용 링크가 제공되고, 해당 링크에서는 관리자 기능이 보이지 않는다."
  - "사업계획서 업로드 화면에는 Google Docs 링크와 PDF/DOCX 파일 입력만 남는다."
  - "사업계획서 업로드 후 사업명이 발췌되어 사업 목록으로 저장된다."
  - "사업계획서 업로드 후 조직명과 캠페인명 검색어가 생성 또는 유지된다."
  - "수동 기사 수집 버튼으로 기사 후보를 다시 불러올 수 있다."
  - "기사 후보는 사업 또는 기본 분류(생태도시, 기후행동, 자원순환, 시민참여, 모금, 기타)에 매칭된다."
  - "기사 목록에 사업 분류와 기사 품질(상/중/하/미분류)이 표시된다."
  - "기사 품질은 보도자료 복붙/사진 기사/인터뷰 추가/별도 취재 기준으로 자동 추천된다."
  - "관리자는 기사별 사업 분류와 품질을 최종 수정할 수 있다."
  - "평가용 요약 초안 UI와 복사 기능이 제거된다."
  - "검증 후 Vercel 운영 주소와 GitHub main 브랜치에 반영된다."
default_categories:
  - "생태도시"
  - "기후행동"
  - "자원순환"
  - "시민참여"
  - "모금"
  - "기타"
press_release_source:
  url: "http://seoulkfem.or.kr/news"
  purpose: "서울환경연합 발송 보도자료 기반 기사인지 판정할 때 참고한다."
